<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7/12 AI 微型程式工作坊｜點名台</title>
<style>
  :root{
    --coral:#FB7185; --mint:#10B981; --sky:#38BDF8;
    --purple:#A78BFA; --pink:#F472B6;
    --fg:#F5F0FF; --fg-mute:#B8B0DA;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(167,139,250,.25)}
  html,body{min-height:100%;color:var(--fg);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:#141031;
    background:linear-gradient(180deg,#0F0B24 0%,#1E1748 50%,#0F0B24 100%);
    overflow-x:hidden;
  }

  header{padding:6vh 5vw 2vh;text-align:center}
  .kicker{display:inline-block;padding:.4em 1.1em;border-radius:999px;
    background:rgba(255,255,255,.09);color:#E9D5FF;
    border:1px solid rgba(255,255,255,.14);
    font-size:.82em;letter-spacing:.14em;font-weight:800;margin-bottom:1.2em;}
  h1{font-size:clamp(34px,6vw,64px);font-weight:900;line-height:1.1;
    letter-spacing:-.01em;margin-bottom:.4em;
    background:linear-gradient(120deg,#FDE68A 0%,#FBCFE8 45%,#C4B5FD 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .subtitle{color:var(--fg-mute);font-size:clamp(15px,1.9vw,20px);font-weight:500}
  .subtitle b{color:#FCD34D;font-weight:800}

  .stats{display:flex;justify-content:center;gap:1em;margin:2.2em 0 1.2em;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.07);padding:1em 1.5em;border-radius:18px;
    text-align:center;min-width:130px;border:1px solid rgba(255,255,255,.12);}
  .stat-num{font-size:2.2em;font-weight:900;line-height:1}
  .stat-num.done{color:#6EE7B7}
  .stat-num.total{color:#C4B5FD}
  .stat-num.left{color:#FCA5A5}
  .stat-label{font-size:.8em;color:var(--fg-mute);margin-top:.4em;letter-spacing:.08em;font-weight:700}

  .progress-wrap{max-width:640px;margin:0 auto 3.4em;padding:0 5vw}
  .progress{height:14px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;
    border:1px solid rgba(255,255,255,.12);}
  .progress-bar{height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--mint),var(--sky),var(--purple),var(--coral));
    transition:width .8s ease;}
  .progress-text{text-align:center;margin-top:.8em;color:var(--fg-mute);font-size:.95em;font-weight:600}

  main{max-width:1240px;margin:0 auto;padding:0 5vw 6vh}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}

  .card{
    display:block;width:100%;
    position:relative;background:#fff;border-radius:20px;
    padding:1.7em 1em 1.4em;text-align:center;cursor:pointer;
    border:none;border-top:6px solid #C4B5FD;
    font-family:inherit;
    box-shadow:0 8px 20px rgba(0,0,0,.35);
    transition:transform .2s, box-shadow .2s;
  }
  .card:hover{transform:translateY(-5px);box-shadow:0 16px 32px rgba(139,92,246,.4)}
  .card:active{transform:translateY(-1px)}

  .card-name{font-size:2em;font-weight:900;color:#1F1B4D;
    letter-spacing:.12em;line-height:1.1;margin-bottom:.4em;}
  .card-line{display:inline-block;font-size:.8em;color:#5B5680;font-weight:600;
    padding:.35em .7em;border-radius:8px;background:#FDE68A;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-status{display:inline-block;margin-top:.9em;font-size:.76em;
    color:#7C3AED;letter-spacing:.08em;font-weight:700;
    padding:.4em .8em;border-radius:99px;background:#EDE9FE;}

  .card.signed{background:#D1FAE5;border-top-color:var(--mint);cursor:default}
  .card.signed:hover{transform:none;box-shadow:0 8px 20px rgba(0,0,0,.35)}
  .card.signed .card-name{color:#065F46}
  .card.signed .card-line{background:#fff;color:#047857}
  .card.signed .card-status{background:var(--mint);color:#fff}
  .card.signed::after{content:'✓';position:absolute;top:12px;right:14px;
    color:#fff;font-size:1.2em;font-weight:900;width:32px;height:32px;
    background:var(--mint);border-radius:50%;line-height:32px;}

  /* ===== Modal ===== */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(10,7,25,.82);
    display:none;align-items:flex-start;justify-content:center;
    z-index:100;padding:16px;overflow-y:auto;
  }
  .modal-backdrop.open{display:flex}
  .modal{
    background:#fff;border-radius:24px;max-width:520px;width:100%;
    margin:auto 0;
    box-shadow:0 30px 60px rgba(0,0,0,.5);
    color:#1F1B4D;
  }
  .modal-header{padding:1.8em 1.6em 1.2em;text-align:center;position:relative;
    border-bottom:1px solid #F3EFFF;}
  .modal-close{position:absolute;top:12px;right:12px;
    width:40px;height:40px;border-radius:50%;
    background:#F5F1FF;border:none;cursor:pointer;
    color:#5B5680;font-size:1.3em;line-height:1;font-family:inherit;}
  .modal-question{color:#8B87A8;font-size:.88em;font-weight:700;letter-spacing:.1em;margin-bottom:.3em}
  .modal-name{font-size:2.1em;font-weight:900;letter-spacing:.08em;line-height:1.15;margin-bottom:.3em}
  .modal-line{display:inline-block;font-size:.85em;color:#5B5680;
    padding:.35em .8em;border-radius:8px;background:#FDE68A;font-weight:600}

  .modal-body{padding:1.4em 1.6em .4em}
  .q-block{margin-bottom:1.6em}
  .q-label{font-size:1.05em;font-weight:800;margin-bottom:.3em;display:block;line-height:1.4}
  .q-hint{font-size:.8em;color:#8B87A8;font-weight:500;margin-bottom:.7em;display:block}

  .opts{display:grid;gap:10px}
  .opt{
    display:flex;align-items:center;gap:.8em;
    padding:1em;border-radius:14px;min-height:52px;
    background:#FAF7FF;border:2px solid #E9E4F9;
    cursor:pointer;font-weight:600;color:#1F1B4D;
  }
  .opt input{width:22px;height:22px;flex:0 0 22px;accent-color:#8B5CF6;cursor:pointer}
  .opt:has(input:checked){background:#EDE9FE;border-color:#8B5CF6;color:#5B21B6}

  .modal-actions{padding:.4em 1.6em 1.6em;display:flex;gap:12px}
  .btn{flex:1;padding:1em;border:none;border-radius:14px;
    font-family:inherit;font-size:1em;font-weight:800;cursor:pointer;letter-spacing:.04em;}
  .btn-cancel{background:#F5F1FF;color:#5B5680}
  .btn-submit{background:#10B981;color:#fff;box-shadow:0 6px 14px rgba(16,185,129,.35)}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed}

  .err{color:#E11D48;font-size:.85em;font-weight:700;margin-top:.5em;display:none}
  .err.show{display:block}

  footer{text-align:center;padding:2vh 5vw 6vh;color:var(--fg-mute);font-size:.9em}
  .reset-btn{display:inline-block;margin-top:1.2em;padding:.5em 1.2em;
    background:transparent;color:var(--fg-mute);
    border:1.5px solid rgba(255,255,255,.18);border-radius:99px;
    font-size:.8em;cursor:pointer;font-family:inherit;font-weight:600;}
</style>
</head>
<body>

<header>
  <span class="kicker">2026 · 07 · 12 · SATURDAY NIGHT</span>
  <h1>AI 微型程式工作坊 🎯<br>今晚點名台</h1>
  <p class="subtitle">找到你的名字，點下去 → 答 2 題 → <b>3 秒完成簽到</b></p>

  <div class="stats">
    <div class="stat"><div class="stat-num done" id="signed-count">0</div><div class="stat-label">已 簽 到</div></div>
    <div class="stat"><div class="stat-num total" id="total-count">19</div><div class="stat-label">全 班 人 數</div></div>
    <div class="stat"><div class="stat-num left" id="remaining-count">19</div><div class="stat-label">待 簽 到</div></div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress"><div class="progress-bar" id="bar" style="width:0%"></div></div>
  <div class="progress-text" id="progress-text">還沒有人簽到 · 快來成為第一個 ✨</div>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<!-- Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" type="button" onclick="closeModal()">✕</button>
      <div class="modal-question">請確認</div>
      <div class="modal-name" id="modal-name">—</div>
      <div class="modal-line" id="modal-line">—</div>
    </div>
    <div class="modal-body">

      <div class="q-block">
        <span class="q-label">1️⃣ 你目前訂閱的 AI 模型（可複選）</span>
        <span class="q-hint">老師會依大家常用的工具調整演示節奏</span>
        <div class="opts" id="opts-ai">
          <label class="opt"><input type="checkbox" value="GPT（ChatGPT Plus / Pro）">GPT（ChatGPT Plus / Pro）</label>
          <label class="opt"><input type="checkbox" value="Claude">Claude</label>
          <label class="opt"><input type="checkbox" value="Gemini">Gemini</label>
          <label class="opt"><input type="checkbox" value="都沒有訂閱(用免費版)">都沒有訂閱（用免費版）</label>
        </div>
        <div class="err" id="err-ai">☝ 至少選一個</div>
      </div>

      <div class="q-block">
        <span class="q-label">2️⃣ 今天能否跟完全程？</span>
        <span class="q-hint">課程全程大約到 23:30 結束</span>
        <div class="opts" id="opts-time">
          <label class="opt"><input type="radio" name="time" value="✅ 可以跟完全程">✅ 可以跟完全程</label>
          <label class="opt"><input type="radio" name="time" value="⏰ 中途需要提前離開">⏰ 中途需要提前離開</label>
        </div>
        <div class="err" id="err-time">☝ 請選一項</div>
      </div>

    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" type="button" onclick="closeModal()">不是我，取消</button>
      <button class="btn btn-submit" type="button" id="btn-submit" onclick="submitSignin()">確認送出 ✓</button>
    </div>
  </div>
</div>

<footer>
  💡 點錯人？沒關係，開起來後按「不是我，取消」就好，不會被記錄。
  <br><button class="reset-btn" type="button" onclick="if(confirm('確定要清除這台裝置上的簽到顯示？')){localStorage.removeItem('signin_0712_v2');location.reload()}">重置本機顯示狀態</button>
</footer>

<script>
  var STUDENTS = [
    {name:"張勝",    line:"張勝"},
    {name:"廖惠儀",   line:"廖惠儀"},
    {name:"黃盈盛",   line:"盛(蒼鷺)"},
    {name:"陳藍琳",   line:"Lydia 藍琳"},
    {name:"郭育良",   line:"育良"},
    {name:"賴佳君",   line:"Chia 佳君"},
    {name:"鄧淑卿",   line:"Ching Deng"},
    {name:"陳弘正",   line:"糖炒笠子"},
    {name:"郟顥軒",   line:"altan 顥軒"},
    {name:"謝文濱",   line:"小海"},
    {name:"于子棋",   line:"Mia 于子棋"},
    {name:"周宛瑢",   line:"onezone"},
    {name:"薛怡珍",   line:"Orca"},
    {name:"林欣慧",   line:"欣慧"},
    {name:"孟家宇",   line:"Meng"},
    {name:"謝沐妍",   line:"Mu yen"},
    {name:"李東龍",   line:"daniel東"},
    {name:"江旻璇",   line:"Annie 旻璇"},
    {name:"凃品卉",   line:"A-pin Tu"}
  ];

  var FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSd4GQHrpng5GN3awJlC1en_HnvwDfvb0SO9wrpzLjg21l7OsA/formResponse";
  var ENTRY_NAME = "entry.1358771206";
  var ENTRY_AI   = "entry.1917234261";
  var ENTRY_TIME = "entry.1449837851";
  var STORAGE_KEY = "signin_0712_v2";

  var currentStudent = null;

  function mask(name){
    if(name.length <= 1) return name;
    if(name.length === 2) return name.charAt(0) + "〇";
    return name.charAt(0) + Array(name.length - 1).join("〇") + name.charAt(name.length - 1);
  }
  function getSigned(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
    catch(e){ return []; }
  }
  function isSigned(name){ return getSigned().indexOf(name) !== -1; }
  function addSigned(name){
    var list = getSigned();
    if(list.indexOf(name) === -1){ list.push(name); }
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }catch(e){}
  }

  function updateStats(){
    var done = getSigned().length;
    var total = STUDENTS.length;
    document.getElementById("signed-count").textContent = done;
    document.getElementById("remaining-count").textContent = total - done;
    document.getElementById("bar").style.width = Math.round(done/total*100) + "%";
    var txt = document.getElementById("progress-text");
    if(done === 0) txt.textContent = "還沒有人簽到 · 快來成為第一個 ✨";
    else if(done === total) txt.textContent = "🎉 全班都到齊了！可以上課了！";
    else txt.textContent = done + " / " + total + " 人已簽到 · 還有 " + (total - done) + " 人趕快點名 ⏰";
  }

  function render(){
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    for(var i = 0; i < STUDENTS.length; i++){
      (function(s){
        var signed = isSigned(s.name);
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "card" + (signed ? " signed" : "");
        btn.setAttribute("data-name", s.name);
        btn.innerHTML =
          '<div class="card-name">' + mask(s.name) + '</div>' +
          '<div class="card-line">LINE：' + s.line + '</div>' +
          '<div class="card-status">' + (signed ? "已完成簽到" : "點我開始簽到 →") + '</div>';
        if(!signed){
          btn.onclick = function(){ openModal(s); };
        } else {
          btn.disabled = false; /* 保持可見但無動作 */
        }
        grid.appendChild(btn);
      })(STUDENTS[i]);
    }
    updateStats();
  }

  function openModal(s){
    currentStudent = s;
    document.getElementById("modal-name").textContent = "你是 " + s.name + " 嗎？";
    document.getElementById("modal-line").textContent = "LINE：" + s.line;
    var inputs = document.querySelectorAll("#opts-ai input, #opts-time input");
    for(var i = 0; i < inputs.length; i++){ inputs[i].checked = false; }
    var errs = document.querySelectorAll(".err");
    for(var j = 0; j < errs.length; j++){ errs[j].className = errs[j].className.replace(" show",""); }
    var btn = document.getElementById("btn-submit");
    btn.disabled = false;
    btn.textContent = "確認送出 ✓";
    document.getElementById("modal").className = "modal-backdrop open";
  }
  function closeModal(){
    document.getElementById("modal").className = "modal-backdrop";
    currentStudent = null;
  }
  document.getElementById("modal").onclick = function(e){
    if(e.target && e.target.id === "modal") closeModal();
  };

  function submitSignin(){
    if(!currentStudent) return;

    var aiChecked = document.querySelectorAll("#opts-ai input:checked");
    var timeChecked = document.querySelector("#opts-time input:checked");

    var ok = true;
    var errAi = document.getElementById("err-ai");
    var errTime = document.getElementById("err-time");
    if(aiChecked.length === 0){ errAi.className = "err show"; ok = false; }
    else{ errAi.className = "err"; }
    if(!timeChecked){ errTime.className = "err show"; ok = false; }
    else{ errTime.className = "err"; }
    if(!ok) return;

    var params = [];
    params.push(ENTRY_NAME + "=" + encodeURIComponent(currentStudent.name));
    for(var i = 0; i < aiChecked.length; i++){
      params.push(ENTRY_AI + "=" + encodeURIComponent(aiChecked[i].value));
    }
    params.push(ENTRY_TIME + "=" + encodeURIComponent(timeChecked.value));

    var btn = document.getElementById("btn-submit");
    btn.disabled = true;
    btn.textContent = "送出中…";

    var doneName = currentStudent.name;
    function markDone(){
      addSigned(doneName);
      render();
      closeModal();
    }

    // 用 XHR + form-urlencoded（相容性最高，LINE 內建瀏覽器也 OK）
    try{
      var xhr = new XMLHttpRequest();
      xhr.open("POST", FORM_ACTION, true);
      xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
      xhr.onloadend = markDone;   // no-cors 情境讀不到結果，一律當成功
      xhr.send(params.join("&"));
      // 保險：3 秒後若還沒回應也直接標記完成
      setTimeout(function(){
        if(document.getElementById("modal").className.indexOf("open") !== -1) markDone();
      }, 3000);
    }catch(e){
      markDone();
    }
  }

  render();
</script>

</body>
</html>
