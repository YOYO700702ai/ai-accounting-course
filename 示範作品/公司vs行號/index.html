<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="公司與行號的差異互動教學遊戲，拖拉配對學習創業登記知識">
<title>公司 vs 行號 ─ 互動配對遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--card-bg:#1e293b;--card-border:#334155;
  --blue:#3b82f6;--blue-glow:#3b82f640;--orange:#f97316;--orange-glow:#f9731640;
  --green:#22c55e;--red:#ef4444;--text:#f1f5f9;--text-dim:#94a3b8;
  --font:'Noto Sans TC',sans-serif;
}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Header ── */
.header{text-align:center;padding:28px 20px 12px;position:relative}
.header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header p{color:var(--text-dim);margin-top:6px;font-size:.95rem}
.score-bar{display:flex;justify-content:center;gap:24px;margin-top:10px;font-size:.9rem;color:var(--text-dim)}
.score-bar span{background:#1e293b;padding:4px 14px;border-radius:20px;border:1px solid #334155}

/* ── Layout ── */
.game-wrap{display:flex;gap:20px;padding:10px 24px 30px;max-width:1400px;margin:0 auto}
.game-main{flex:1;min-width:0}
.side-panel{width:320px;flex-shrink:0}

/* ── Cards Area ── */
.cards-area{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;padding:10px 0 20px;min-height:80px}
.card{
  background:var(--card-bg);border:2px solid var(--card-border);border-radius:14px;
  padding:14px 18px;cursor:grab;user-select:none;font-size:.92rem;font-weight:500;
  box-shadow:0 4px 16px #0004;transition:transform .2s,box-shadow .2s,border-color .2s,opacity .2s;
  position:relative;white-space:nowrap;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px #0006;border-color:#475569}
.card.dragging{opacity:.5;cursor:grabbing}
.card.correct{
  border-color:var(--green);background:#166534;cursor:default;pointer-events:none;
  animation:popIn .4s ease;
}
.card.correct::after{content:'✓';position:absolute;top:-8px;right:-8px;background:var(--green);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
.card.wrong{animation:shake .5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(6px)}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* ── Drop Zones ── */
.zones{display:flex;gap:20px;margin-top:8px}
.zone{
  flex:1;border-radius:18px;padding:24px 16px;min-height:220px;
  display:flex;flex-direction:column;align-items:center;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  position:relative;
}
.zone-company{border:3px dashed var(--blue);background:linear-gradient(180deg,#1e3a5f22,#0f172a)}
.zone-sole{border:3px dashed var(--orange);background:linear-gradient(180deg,#5f2e0e22,#0f172a)}
.zone.drag-over{transform:scale(1.03)}
.zone-company.drag-over{border-color:#60a5fa;box-shadow:0 0 30px var(--blue-glow)}
.zone-sole.drag-over{border-color:#fb923c;box-shadow:0 0 30px var(--orange-glow)}
.zone-icon{font-size:2.8rem;margin-bottom:4px}
.zone-label{font-size:1.3rem;font-weight:700;margin-bottom:6px}
.zone-sub{font-size:.8rem;color:var(--text-dim);margin-bottom:12px}
.zone-cards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%}

/* ── Bubble ── */
.bubble{
  position:fixed;padding:10px 18px;border-radius:12px;font-size:.85rem;font-weight:600;
  pointer-events:none;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;
}
.bubble.show{opacity:1}
.bubble.fail{background:var(--red);color:#fff}
.bubble.pass{background:var(--green);color:#fff}

/* ── Side Panel ── */
.side-panel{background:#1e293b;border-radius:18px;border:1px solid #334155;padding:20px;display:flex;flex-direction:column;max-height:calc(100vh - 140px);position:sticky;top:20px}
.panel-title{font-size:1.1rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.panel-title .emoji{font-size:1.4rem}
.panel-sub{font-size:.78rem;color:var(--text-dim);margin-bottom:14px}
.notes-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
.notes-list::-webkit-scrollbar{width:4px}
.notes-list::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
.note-item{background:#0f172a;border-radius:10px;padding:12px;font-size:.82rem;line-height:1.6;border-left:3px solid var(--green);animation:fadeIn .5s ease}
.note-item .note-q{font-weight:700;color:var(--green);margin-bottom:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-empty{color:#475569;font-size:.85rem;text-align:center;margin-top:30px}
.btn-download{
  margin-top:14px;padding:12px;border:none;border-radius:12px;font-family:var(--font);
  font-size:.9rem;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--orange));color:#fff;
  transition:opacity .2s;display:none;
}
.btn-download:hover{opacity:.85}

/* ── Complete Modal ── */
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border-radius:20px;padding:40px 36px;text-align:center;max-width:420px;width:90%;border:1px solid #334155;box-shadow:0 20px 60px #000a;animation:popIn .5s ease}
.modal h2{font-size:1.6rem;font-weight:900;margin-bottom:6px}
.modal .stars{font-size:2.4rem;margin:10px 0}
.modal p{color:var(--text-dim);font-size:.95rem;line-height:1.7;margin-bottom:16px}
.modal button{padding:12px 32px;border:none;border-radius:12px;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--orange));color:#fff;transition:opacity .2s}
.modal button:hover{opacity:.85}

/* ── Responsive ── */
@media(max-width:900px){
  .game-wrap{flex-direction:column}
  .side-panel{width:100%;max-height:none;position:static}
}
@media(max-width:600px){
  .zones{flex-direction:column}
  .card{font-size:.82rem;padding:10px 14px}
}
</style>
</head>
<body>

<div class="header">
  <h1>🏢 公司 vs 行號 🏪</h1>
  <p>把卡片拖到正確的分類格子裡，學習創業登記的關鍵差異！</p>
  <div class="score-bar">
    <span>✅ 答對：<b id="rightCount">0</b> / 10</span>
    <span>🔄 嘗試：<b id="tryCount">0</b></span>
  </div>
</div>

<div class="game-wrap">
  <div class="game-main">
    <div class="cards-area" id="cardsArea"></div>
    <div class="zones">
      <div class="zone zone-company" id="zoneCompany" data-type="公司">
        <div class="zone-icon">🏢</div>
        <div class="zone-label">公司</div>
        <div class="zone-sub">有限公司 ‧ 股份有限公司</div>
        <div class="zone-cards" id="zoneCompanyCards"></div>
      </div>
      <div class="zone zone-sole" id="zoneSole" data-type="行號">
        <div class="zone-icon">🏪</div>
        <div class="zone-label">行號</div>
        <div class="zone-sub">獨資 ‧ 合夥</div>
        <div class="zone-cards" id="zoneSoleCards"></div>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-title"><span class="emoji">🧑‍💼</span> 會計師小提醒</div>
    <div class="panel-sub">每配對成功一張卡片，這裡就會出現對應的解說喔！</div>
    <div class="notes-list" id="notesList">
      <div class="panel-empty" id="panelEmpty">尚未配對任何卡片…<br>開始拖拉吧 👆</div>
    </div>
    <button class="btn-download" id="btnDownload" onclick="downloadNotes()">📥 下載完整筆記</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>🎉 全部完成！</h2>
    <div class="stars" id="modalStars"></div>
    <p id="modalMsg"></p>
    <button onclick="resetGame()">🔄 再玩一次</button>
  </div>
</div>

<div class="bubble" id="bubble"></div>

<script>
const DATA = [
  {id:1,text:'股東只賠出資的錢',answer:'公司',note:'公司是「有限責任」，股東最多只賠到當初出資的金額，個人其他財產不受影響。這是公司制度最大的保護傘！'},
  {id:2,text:'老闆要拿個人財產扛',answer:'行號',note:'行號是「無限責任」，如果生意虧損或欠債，老闆必須拿自己的房子、存款等個人財產來償還，風險較高。'},
  {id:3,text:'課營所稅',answer:'公司',note:'公司是獨立法人，獲利要先繳 20% 的營利事業所得稅（營所稅），盈餘分配給股東時，股東再繳個人所得稅。'},
  {id:4,text:'收入直接併入個人綜所稅',answer:'行號',note:'行號不是法人，盈餘直接視為老闆的個人所得，併入綜合所得稅申報，稅率依個人所得級距而定。'},
  {id:5,text:'可以發行股票',answer:'公司',note:'只有「股份有限公司」可以發行股票，這是未來上市櫃、對外募資的基礎。行號完全沒有這個選項。'},
  {id:6,text:'設立程序最簡單便宜',answer:'行號',note:'行號只需要做商業登記，流程簡單、規費便宜，通常幾天就搞定。公司則要擬章程、選董監事，手續多很多。'},
  {id:7,text:'夜市賣鹹酥雞，一個人做',answer:'行號',note:'一個人在夜市擺攤，規模小、不需要對外募資，用行號（獨資）登記最省事、成本最低！'},
  {id:8,text:'想拿創投投資 5000 萬',answer:'公司',note:'創投投資一定要求被投資方是「公司」，因為要持股、要有股權結構。行號沒辦法發行股份給投資人。'},
  {id:9,text:'跟朋友合資開咖啡廳，怕負債連累家人',answer:'公司',note:'怕負債連累家人 ＝ 需要「有限責任」的保護。開有限公司，每個股東最多賠出資額，不會波及個人家庭財產。'},
  {id:10,text:'家庭主婦兼職賣手工餅乾',answer:'行號',note:'小規模兼職經營，用行號（獨資）最簡單，設立費用低、稅務單純，適合先試水溫的創業者。'}
];

let rightCount=0, tryCount=0, matched=0;
let dragId=null;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function init(){
  const area=document.getElementById('cardsArea');
  area.innerHTML='';
  shuffle([...DATA]).forEach(d=>{
    const el=document.createElement('div');
    el.className='card';
    el.textContent=d.text;
    el.draggable=true;
    el.dataset.id=d.id;
    el.addEventListener('dragstart',onDragStart);
    el.addEventListener('dragend',onDragEnd);
    // touch
    el.addEventListener('touchstart',onTouchStart,{passive:false});
    el.addEventListener('touchmove',onTouchMove,{passive:false});
    el.addEventListener('touchend',onTouchEnd);
    area.appendChild(el);
  });

  document.querySelectorAll('.zone').forEach(z=>{
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag-over')});
    z.addEventListener('dragleave',()=>z.classList.remove('drag-over'));
    z.addEventListener('drop',onDrop);
  });
}

function onDragStart(e){
  dragId=e.target.dataset.id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function onDragEnd(e){e.target.classList.remove('dragging')}

function onDrop(e){
  e.preventDefault();
  const zone=e.currentTarget;
  zone.classList.remove('drag-over');
  if(!dragId)return;
  handleDrop(dragId,zone);
  dragId=null;
}

/* ── Touch support ── */
let touchEl=null,touchClone=null,touchStartX,touchStartY;
function onTouchStart(e){
  e.preventDefault();
  touchEl=e.currentTarget;
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;
  touchClone=touchEl.cloneNode(true);
  touchClone.style.cssText='position:fixed;z-index:900;pointer-events:none;opacity:.8;transform:scale(1.05);';
  touchClone.style.left=(t.clientX-touchEl.offsetWidth/2)+'px';
  touchClone.style.top=(t.clientY-20)+'px';
  touchClone.style.width=touchEl.offsetWidth+'px';
  document.body.appendChild(touchClone);
  touchEl.classList.add('dragging');
}
function onTouchMove(e){
  e.preventDefault();
  if(!touchClone)return;
  const t=e.touches[0];
  touchClone.style.left=(t.clientX-touchEl.offsetWidth/2)+'px';
  touchClone.style.top=(t.clientY-20)+'px';
  document.querySelectorAll('.zone').forEach(z=>{
    const r=z.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)z.classList.add('drag-over');
    else z.classList.remove('drag-over');
  });
}
function onTouchEnd(e){
  if(!touchEl)return;
  touchEl.classList.remove('dragging');
  if(touchClone){touchClone.remove();touchClone=null}
  const t=e.changedTouches[0];
  let hitZone=null;
  document.querySelectorAll('.zone').forEach(z=>{
    z.classList.remove('drag-over');
    const r=z.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)hitZone=z;
  });
  if(hitZone)handleDrop(touchEl.dataset.id,hitZone);
  touchEl=null;
}

function handleDrop(cardId,zone){
  const d=DATA.find(x=>x.id==cardId);
  const cardEl=document.querySelector(`.card[data-id="${cardId}"]`);
  if(!d||!cardEl||cardEl.classList.contains('correct'))return;
  tryCount++;
  document.getElementById('tryCount').textContent=tryCount;

  if(d.answer===zone.dataset.type){
    // correct
    rightCount++;matched++;
    document.getElementById('rightCount').textContent=rightCount;
    cardEl.classList.add('correct');
    cardEl.draggable=false;
    // move card into zone
    zone.querySelector('.zone-cards').appendChild(cardEl);
    showBubble('✅ 正確！',false,zone);
    addNote(d);
    if(matched>=10)setTimeout(showComplete,800);
  } else {
    cardEl.classList.add('wrong');
    showBubble('❌ 再想想！',true,zone);
    setTimeout(()=>cardEl.classList.remove('wrong'),500);
  }
}

function showBubble(msg,fail,zone){
  const b=document.getElementById('bubble');
  const r=zone.getBoundingClientRect();
  b.textContent=msg;
  b.className='bubble '+(fail?'fail':'pass')+' show';
  b.style.left=(r.left+r.width/2-60)+'px';
  b.style.top=(r.top-40)+'px';
  setTimeout(()=>b.classList.remove('show'),1200);
}

function addNote(d){
  document.getElementById('panelEmpty').style.display='none';
  const list=document.getElementById('notesList');
  const item=document.createElement('div');
  item.className='note-item';
  const tag=d.answer==='公司'?'🏢 公司':'🏪 行號';
  item.innerHTML=`<div class="note-q">${tag}｜${d.text}</div><div>${d.note}</div>`;
  list.appendChild(item);
  item.scrollIntoView({behavior:'smooth',block:'nearest'});
  if(matched>=10)document.getElementById('btnDownload').style.display='block';
}

function showComplete(){
  const m=document.getElementById('modal');
  const stars=tryCount<=12?'⭐⭐⭐':tryCount<=15?'⭐⭐':'⭐';
  document.getElementById('modalStars').textContent=stars;
  document.getElementById('modalMsg').innerHTML=`你答對了 <b>${rightCount}</b> / 10 題<br>總共嘗試了 <b>${tryCount}</b> 次<br><br>左邊的「會計師小提醒」已經變成<br>一份完整的 <b>公司 vs 行號對照筆記</b>，<br>記得按「下載筆記」存起來！`;
  m.classList.add('show');
}

function resetGame(){
  rightCount=0;tryCount=0;matched=0;
  document.getElementById('rightCount').textContent=0;
  document.getElementById('tryCount').textContent=0;
  document.getElementById('modal').classList.remove('show');
  document.getElementById('notesList').innerHTML='<div class="panel-empty" id="panelEmpty">尚未配對任何卡片…<br>開始拖拉吧 👆</div>';
  document.getElementById('btnDownload').style.display='none';
  document.querySelectorAll('.zone-cards').forEach(z=>z.innerHTML='');
  init();
}

function downloadNotes(){
  let txt='══════════════════════════════\n';
  txt+='  公司 vs 行號 ─ 對照筆記\n';
  txt+='══════════════════════════════\n\n';
  txt+='【🏢 公司（有限公司、股份有限公司）】\n';
  txt+='• 法人，有獨立法律人格\n• 股東有限責任（以出資額為上限）\n• 適用：公司法\n• 稅務：營業稅 ＋ 營所稅 ＋ 股東股利所得\n• 可發行股票（股份有限公司）\n• 適合中大型規模、募資、品牌經營\n\n';
  txt+='【🏪 行號（獨資、合夥）】\n';
  txt+='• 非法人，無獨立法律人格\n• 負責人無限責任（個人財產須負全責）\n• 適用：商業登記法\n• 稅務：營業稅 ＋ 直接併入個人綜所稅\n• 不能發行股票\n• 適合小規模、單純經營\n\n';
  txt+='──────────────────────────────\n';
  txt+='  配對解說\n';
  txt+='──────────────────────────────\n\n';
  DATA.sort((a,b)=>a.id-b.id).forEach(d=>{
    const tag=d.answer==='公司'?'🏢 公司':'🏪 行號';
    txt+=`【${tag}】${d.text}\n→ ${d.note}\n\n`;
  });
  txt+='══════════════════════════════\n';
  txt+='  由您的會計師提供 ❤️\n';
  txt+='══════════════════════════════\n';
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='公司vs行號_對照筆記.txt';
  a.click();
}

init();
</script>
</body>
</html>
