<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>大冒險地圖 · 三關大門</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#1a1230;
    --bg2:#2a1d4a;
    --paper:#f5e7c4;
    --gold:#fbbf24;
    --gold2:#fde68a;
    --green:#22c55e;
    --red:#ef4444;
    --ink:#1a0f08;
    --muted:#a8a4b8;
    --card:rgba(255,255,255,.08);
    --card2:rgba(255,255,255,.14);
  }
  html,body{height:100%;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    color:var(--paper);
    background:
      radial-gradient(ellipse at 20% 10%, #3d2a6b 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, #4a2360 0%, transparent 55%),
      radial-gradient(ellipse at top,#2a1d4a,#0d0820 75%);
    -webkit-font-smoothing:antialiased;min-height:100vh;
    overflow-x:hidden}
  body{display:flex;flex-direction:column;align-items:center;padding:24px 16px}

  .header{width:min(1100px,100%);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:24px}
  .titlebox h1{font-size:clamp(28px,5vw,44px);font-weight:900;
    background:linear-gradient(180deg,var(--gold2),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 24px rgba(251,191,36,.25);letter-spacing:2px}
  .titlebox p{margin-top:6px;color:var(--muted);font-size:15px;letter-spacing:1px}

  .reset-btn{background:rgba(0,0,0,.4);color:#ffd1d1;border:1px solid rgba(239,68,68,.5);
    padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;
    transition:.2s}
  .reset-btn:hover{background:rgba(239,68,68,.25);color:#fff}

  .levels{width:min(1100px,100%);display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
  @media (max-width:760px){.levels{grid-template-columns:1fr}}

  .level{background:var(--card);border:2px solid rgba(255,255,255,.12);border-radius:18px;
    padding:28px 20px;cursor:pointer;transition:.25s;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    backdrop-filter:blur(6px);position:relative;overflow:hidden}
  .level::before{content:"";position:absolute;inset:0;
    background:linear-gradient(135deg,transparent,rgba(255,255,255,.04));pointer-events:none}
  .level:hover{transform:translateY(-4px);border-color:var(--gold);
    box-shadow:0 12px 32px rgba(251,191,36,.2)}
  .level.done{border-color:var(--green);background:rgba(34,197,94,.12)}
  .level.done:hover{box-shadow:0 12px 32px rgba(34,197,94,.3)}
  .level .ico{font-size:64px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
  .level .name{font-size:22px;font-weight:900;letter-spacing:1px}
  .level .status{font-size:14px;padding:4px 12px;border-radius:999px;
    background:rgba(0,0,0,.35);color:var(--muted)}
  .level.done .status{background:var(--green);color:#fff;font-weight:700}

  .gate-wrap{width:min(1100px,100%);display:flex;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap}
  .gate-btn{font-size:20px;font-weight:900;letter-spacing:2px;
    background:linear-gradient(180deg,#7c3aed,#5b21b6);
    color:#fff;border:none;padding:18px 40px;border-radius:14px;cursor:pointer;
    box-shadow:0 8px 24px rgba(124,58,237,.4);transition:.2s}
  .gate-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.6)}
  .gate-btn:active{transform:translateY(0)}
  .gate-count{font-size:16px;color:var(--gold2);font-weight:700;letter-spacing:1px}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(5,2,15,.85);
    display:none;align-items:center;justify-content:center;z-index:1000;
    padding:16px;backdrop-filter:blur(4px)}
  .modal-bg.show{display:flex}
  .modal{background:linear-gradient(180deg,#2a1d4a,#1a1230);
    border:2px solid var(--gold);border-radius:20px;
    width:min(640px,100%);max-height:92vh;overflow-y:auto;
    padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative}
  .modal h2{text-align:center;font-size:28px;font-weight:900;
    color:var(--gold2);margin-bottom:6px;letter-spacing:2px}
  .modal .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:24px}
  .modal .close{position:absolute;top:12px;right:14px;background:transparent;
    border:none;color:var(--muted);font-size:24px;cursor:pointer;width:36px;height:36px;border-radius:50%}
  .modal .close:hover{background:rgba(255,255,255,.1);color:#fff}

  /* Slots */
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
  .slot{aspect-ratio:1;background:rgba(0,0,0,.35);border:3px dashed rgba(255,255,255,.25);
    border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;transition:.2s;position:relative}
  .slot .lbl{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:1px}
  .slot .hint{font-size:32px;opacity:.3}
  .slot.drag-over{border-color:var(--gold);background:rgba(251,191,36,.15)}
  .slot.filled{border-style:solid;border-color:var(--green);background:rgba(34,197,94,.18)}
  .slot.wrong{animation:shake .35s;border-color:var(--red);background:rgba(239,68,68,.2)}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)}
  }
  .slot .placed{font-size:38px;line-height:1}
  .slot .placed-name{font-size:12px;color:#fff;font-weight:700;margin-top:2px}

  .bag-title{font-size:14px;color:var(--muted);text-align:center;margin-bottom:10px;letter-spacing:2px}
  .bag{min-height:120px;background:rgba(0,0,0,.25);border-radius:14px;padding:14px;
    display:flex;gap:12px;justify-content:center;flex-wrap:wrap;align-items:center;
    border:1px solid rgba(255,255,255,.08)}
  .bag-empty{color:var(--muted);font-size:13px;font-style:italic}

  .badge{width:80px;height:80px;border-radius:14px;
    background:linear-gradient(180deg,#fde68a,#d4a017);
    border:2px solid #8a6a14;color:#3a2400;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:grab;user-select:none;touch-action:none;transition:.15s;
    box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.5);
    font-weight:900}
  .badge:hover{transform:scale(1.05)}
  .badge.dragging{opacity:.4;cursor:grabbing}
  .badge .be{font-size:30px;line-height:1}
  .badge .bn{font-size:11px;margin-top:3px;letter-spacing:1px}

  /* Ghost for touch drag */
  .ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;transform:translate(-50%,-50%) scale(1.1)}

  /* Victory */
  .victory{text-align:center;padding:20px 0}
  .victory .tro{font-size:90px;margin-bottom:8px;animation:bounce 1.4s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .victory h2{font-size:36px;background:linear-gradient(180deg,var(--gold2),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:14px}
  .victory .time{font-size:18px;color:var(--paper);margin-bottom:6px}
  .victory .time b{color:var(--gold2);font-size:24px;margin:0 4px}
  .victory .again{margin-top:24px;background:linear-gradient(180deg,#fbbf24,#d97706);
    color:#1a0f08;border:none;padding:14px 32px;border-radius:12px;font-weight:900;
    font-size:16px;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 16px rgba(251,191,36,.4)}
  .victory .again:hover{transform:translateY(-2px)}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.85);color:#fff;padding:12px 22px;border-radius:10px;
    z-index:2000;opacity:0;transition:.3s;pointer-events:none;font-weight:600}
  .toast.show{opacity:1}
</style>
</head>
<body>

<header class="header">
  <div class="titlebox">
    <h1>🗺️ 大冒險地圖</h1>
    <p>完成 3 個關卡，拿到 3 個憑證解開大門</p>
  </div>
  <button class="reset-btn" id="resetBtn">🔄 清除進度</button>
</header>

<section class="levels" id="levels"></section>

<div class="gate-wrap">
  <button class="gate-btn" id="gateBtn">🔒 通關大門</button>
  <div class="gate-count">目前持有：<span id="ownCount">0</span> / 3</div>
</div>

<!-- Gate Modal -->
<div class="modal-bg" id="gateModal">
  <div class="modal" id="gateModalInner">
    <button class="close" id="closeGate">✕</button>
    <div id="gateBody">
      <h2>🚪 通關大門</h2>
      <p class="sub">把對應的憑證拖到凹槽裡</p>
      <div class="slots" id="slots">
        <div class="slot" data-key="cert_dynasty"><div class="hint">🎴</div><div class="lbl">朝代</div></div>
        <div class="slot" data-key="cert_idiom"><div class="hint">📝</div><div class="lbl">成語</div></div>
        <div class="slot" data-key="cert_warrior"><div class="hint">⚔️</div><div class="lbl">勇者</div></div>
      </div>
      <div class="bag-title">— 背包 —</div>
      <div class="bag" id="bag"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const LEVELS = [
    {key:'cert_dynasty', name:'朝代配對', icon:'🎴', emoji:'🎴', short:'朝代', url:'../示範1_朝代配對/index.html'},
    {key:'cert_idiom',   name:'成語填字', icon:'📝', emoji:'📝', short:'成語', url:'../示範2_成語填字/index.html'},
    {key:'cert_warrior', name:'打怪 RPG', icon:'⚔️', emoji:'⚔️', short:'勇者', url:'../示範3_打怪RPG/index.html'},
  ];

  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));

  function owned(){ return LEVELS.filter(l => localStorage.getItem(l.key)); }

  function renderLevels(){
    const wrap = $('#levels'); wrap.innerHTML = '';
    LEVELS.forEach(l => {
      const done = !!localStorage.getItem(l.key);
      const el = document.createElement('div');
      el.className = 'level' + (done ? ' done' : '');
      el.innerHTML = `
        <div class="ico">${l.icon}</div>
        <div class="name">${l.name}</div>
        <div class="status">${done ? '已完成 ✓' : '未完成'}</div>
      `;
      el.addEventListener('click', () => {
        if (!localStorage.getItem('adventure_start')) {
          localStorage.setItem('adventure_start', Date.now());
        }
        location.href = l.url;
      });
      wrap.appendChild(el);
    });
    $('#ownCount').textContent = owned().length;
  }

  function showToast(msg){
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove('show'), 1600);
  }

  /* ---------- Gate Modal ---------- */
  const gateModal = $('#gateModal');
  const placed = {}; // key -> true once correctly placed

  function resetGateBody(){
    $('#gateBody').innerHTML = `
      <h2>🚪 通關大門</h2>
      <p class="sub">把對應的憑證拖到凹槽裡</p>
      <div class="slots" id="slots">
        <div class="slot" data-key="cert_dynasty"><div class="hint">🎴</div><div class="lbl">朝代</div></div>
        <div class="slot" data-key="cert_idiom"><div class="hint">📝</div><div class="lbl">成語</div></div>
        <div class="slot" data-key="cert_warrior"><div class="hint">⚔️</div><div class="lbl">勇者</div></div>
      </div>
      <div class="bag-title">— 背包 —</div>
      <div class="bag" id="bag"></div>
    `;
    bindSlots();
  }

  function openGate(){
    Object.keys(placed).forEach(k => delete placed[k]);
    resetGateBody();
    renderGate();
    gateModal.classList.add('show');
  }
  function closeGate(){ gateModal.classList.remove('show'); }

  $('#gateBtn').addEventListener('click', openGate);
  $('#closeGate').addEventListener('click', closeGate);
  gateModal.addEventListener('click', e => { if (e.target === gateModal) closeGate(); });

  function renderGate(){
    $$('#slots .slot').forEach(s => {
      s.classList.remove('filled','wrong','drag-over');
      const key = s.dataset.key;
      const l = LEVELS.find(x => x.key === key);
      if (placed[key]){
        s.classList.add('filled');
        s.innerHTML = `<div class="placed">${l.emoji}</div><div class="placed-name">${l.short}之印</div>`;
      } else {
        s.innerHTML = `<div class="hint">${l.emoji}</div><div class="lbl">${l.short}</div>`;
      }
    });
    const bag = $('#bag'); bag.innerHTML = '';
    const items = owned().filter(l => !placed[l.key]);
    if (items.length === 0){
      const e = document.createElement('div');
      e.className = 'bag-empty';
      e.textContent = owned().length === 0 ? '背包是空的，先去完成關卡拿到憑證吧！' : '背包已清空';
      bag.appendChild(e);
    } else {
      items.forEach(l => {
        const b = document.createElement('div');
        b.className = 'badge';
        b.draggable = true;
        b.dataset.key = l.key;
        b.innerHTML = `<div class="be">${l.emoji}</div><div class="bn">${l.short}之印</div>`;
        attachDrag(b);
        bag.appendChild(b);
      });
    }
  }

  /* ---------- Drag (mouse + touch) ---------- */
  function attachDrag(el){
    el.addEventListener('dragstart', e => {
      el.classList.add('dragging');
      e.dataTransfer.setData('text/plain', el.dataset.key);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));

    let ghost = null;
    el.addEventListener('touchstart', e => {
      const t = e.touches[0];
      ghost = el.cloneNode(true);
      ghost.classList.add('ghost'); ghost.classList.remove('dragging');
      ghost.style.left = t.clientX + 'px';
      ghost.style.top  = t.clientY + 'px';
      document.body.appendChild(ghost);
      el.classList.add('dragging');
    }, {passive:true});
    el.addEventListener('touchmove', e => {
      if (!ghost) return;
      const t = e.touches[0];
      ghost.style.left = t.clientX + 'px';
      ghost.style.top  = t.clientY + 'px';
      $$('#slots .slot').forEach(s => s.classList.remove('drag-over'));
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const slot = target && target.closest('.slot');
      if (slot) slot.classList.add('drag-over');
      e.preventDefault();
    }, {passive:false});
    el.addEventListener('touchend', e => {
      if (!ghost) return;
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const slot = target && target.closest('.slot');
      ghost.remove(); ghost = null;
      el.classList.remove('dragging');
      $$('#slots .slot').forEach(s => s.classList.remove('drag-over'));
      if (slot) tryDrop(slot, el.dataset.key);
    });
  }

  function bindSlots(){
    $$('#slots .slot').forEach(slot => {
      slot.addEventListener('dragover', e => {
        e.preventDefault(); slot.classList.add('drag-over');
      });
      slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
      slot.addEventListener('drop', e => {
        e.preventDefault();
        slot.classList.remove('drag-over');
        const key = e.dataTransfer.getData('text/plain');
        tryDrop(slot, key);
      });
    });
  }

  function tryDrop(slot, key){
    if (slot.dataset.key === key){
      placed[key] = true;
      renderGate();
      checkWin();
    } else {
      slot.classList.add('wrong');
      setTimeout(() => slot.classList.remove('wrong'), 400);
      showToast('不對唷，再想想看～');
    }
  }

  function checkWin(){
    if (LEVELS.every(l => placed[l.key])){
      setTimeout(showVictory, 600);
    }
  }

  function fmtTime(ms){
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60);
    const r = s % 60;
    return `${String(m).padStart(2,'0')} 分 ${String(r).padStart(2,'0')} 秒`;
  }

  function showVictory(){
    const start = parseInt(localStorage.getItem('adventure_start') || '0', 10);
    const dur = start ? (Date.now() - start) : 0;
    $('#gateBody').innerHTML = `
      <div class="victory">
        <div class="tro">🏆</div>
        <h2>冒險完成！</h2>
        <div class="time">總冒險時長：<b>${fmtTime(dur)}</b></div>
        <button class="again" id="againBtn">再次冒險</button>
      </div>
    `;
    $('#againBtn').addEventListener('click', () => {
      resetAll();
      closeGate();
      renderLevels();
    });
  }

  function resetAll(){
    ['cert_dynasty','cert_idiom','cert_warrior','adventure_start'].forEach(k => localStorage.removeItem(k));
  }

  $('#resetBtn').addEventListener('click', () => {
    if (confirm('確定要清除所有進度嗎？這會把 3 個憑證和冒險時間都歸零。')){
      resetAll();
      renderLevels();
      showToast('進度已清除');
    }
  });

  // init
  renderLevels();
</script>
</body>
</html>
