<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="營業稅秒懂試算互動教學頁，讓小公司老闆用滑桿理解銷項稅、進項稅與應納稅額。">
<title>營業稅秒懂試算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{
  --bg:#0f172a;
  --panel:#1e293b;
  --panel-2:#111c31;
  --line:rgba(148,163,184,.22);
  --text:#f8fafc;
  --muted:#94a3b8;
  --blue:#38bdf8;
  --blue-deep:#2563eb;
  --green:#34d399;
  --green-deep:#059669;
  --gold:#fbbf24;
  --gold-deep:#f59e0b;
  --purple:#a78bfa;
  --purple-deep:#7c3aed;
  --danger:#fb7185;
  --shadow:0 24px 80px rgba(2,6,23,.36);
  --font:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
}
html{font-size:16px;overflow-x:hidden}
body{
  margin:0;
  min-height:100vh;
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(circle at 18% 8%,rgba(56,189,248,.18),transparent 30%),
    radial-gradient(circle at 82% 12%,rgba(251,191,36,.14),transparent 28%),
    radial-gradient(circle at 54% 86%,rgba(167,139,250,.14),transparent 30%),
    var(--bg);
  overflow-x:hidden;
}
button,input{font:inherit;min-width:0}
.app{
  width:min(1480px,100%);
  margin:0 auto;
  padding:28px;
}
.topbar,.main-grid,.calculator,.slider-panel,.slider-box,.scenario-panel,.results,.result-card,.chart-panel,.advisor{min-width:0}
.app *{min-width:0}
.slider-head,.range-wrap,.scenario-buttons,.section-head,.tips,.status-badge{max-width:100%}
.topbar{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:20px;
  align-items:end;
  margin-bottom:20px;
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  width:max-content;
  max-width:100%;
  padding:7px 12px;
  border:1px solid rgba(251,191,36,.34);
  border-radius:999px;
  background:rgba(251,191,36,.08);
  color:#fde68a;
  font-size:.84rem;
  font-weight:900;
}
.pulse{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 0 6px rgba(251,191,36,.14),0 0 22px rgba(251,191,36,.62);
}
h1{
  margin:14px 0 8px;
  font-size:clamp(2.25rem,5vw,5.1rem);
  line-height:1.02;
  letter-spacing:0;
  font-weight:900;
  text-shadow:0 0 34px rgba(56,189,248,.18);
  overflow-wrap:anywhere;
}
.lead{
  max-width:760px;
  margin:0;
  color:#cbd5e1;
  font-size:1.05rem;
  line-height:1.75;
  overflow-wrap:anywhere;
}
.scenario-panel{
  width:min(520px,100%);
  padding:14px;
  border:1px solid var(--line);
  border-radius:18px;
  background:linear-gradient(180deg,rgba(30,41,59,.96),rgba(15,23,42,.92));
  box-shadow:0 16px 42px rgba(2,6,23,.22);
}
.scenario-title{
  margin:0 0 10px;
  color:#e2e8f0;
  font-size:.9rem;
  font-weight:900;
}
.scenario-buttons{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;
}
.scenario-btn{
  width:100%;
  max-width:100%;
  min-height:48px;
  padding:9px 10px;
  border:1px solid rgba(251,191,36,.28);
  border-radius:13px;
  background:rgba(15,23,42,.62);
  color:#f8fafc;
  cursor:pointer;
  font-weight:900;
  text-align:left;
  white-space:normal;
  overflow-wrap:anywhere;
  line-height:1.35;
  transition:transform .18s,border-color .18s,box-shadow .18s,background .18s;
}
.scenario-btn:hover{
  transform:translateY(-2px);
  border-color:rgba(251,191,36,.72);
  box-shadow:0 0 24px rgba(251,191,36,.16);
}
.main-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) 360px;
  gap:22px;
  align-items:start;
}
.calculator{
  display:grid;
  gap:18px;
}
.slider-panel,.result-card,.chart-panel,.advisor{
  border:1px solid var(--line);
  border-radius:22px;
  background:linear-gradient(180deg,rgba(30,41,59,.96),rgba(15,23,42,.92));
  box-shadow:var(--shadow);
}
.slider-panel{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:16px;
  padding:18px;
}
.slider-box{
  padding:18px;
  border:1px solid rgba(148,163,184,.2);
  border-radius:18px;
  background:rgba(15,23,42,.58);
}
.slider-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:14px;
}
.slider-label{
  color:#e2e8f0;
  font-size:1.05rem;
  font-weight:900;
  overflow-wrap:anywhere;
}
.amount-pill{
  flex:0 0 auto;
  max-width:100%;
  padding:6px 10px;
  border-radius:999px;
  color:#111827;
  background:linear-gradient(180deg,#fde68a,#fbbf24);
  box-shadow:0 0 24px rgba(251,191,36,.24);
  font-weight:900;
  white-space:nowrap;
}
.range-wrap{
  position:relative;
  padding:14px 0 10px;
}
input[type=range]{
  display:block;
  width:100%;
  min-width:0;
  height:34px;
  margin:0;
  appearance:none;
  -webkit-appearance:none;
  background:transparent;
  cursor:pointer;
  touch-action:pan-y;
}
input[type=range]::-webkit-slider-runnable-track{
  height:10px;
  border-radius:999px;
  background:linear-gradient(90deg,#f59e0b,var(--gold));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),0 0 18px rgba(251,191,36,.2);
}
input[type=range]::-webkit-slider-thumb{
  appearance:none;
  -webkit-appearance:none;
  width:30px;
  height:30px;
  margin-top:-10px;
  border-radius:50%;
  border:4px solid #fff7cc;
  background:radial-gradient(circle at 35% 35%,#fff7cc 0 15%,#fbbf24 16% 62%,#b45309 63% 100%);
  box-shadow:0 0 0 8px rgba(251,191,36,.15),0 0 28px rgba(251,191,36,.72);
}
input[type=range]::-moz-range-track{
  height:10px;
  border-radius:999px;
  background:linear-gradient(90deg,#f59e0b,var(--gold));
}
input[type=range]::-moz-range-thumb{
  width:26px;
  height:26px;
  border-radius:50%;
  border:4px solid #fff7cc;
  background:#fbbf24;
  box-shadow:0 0 0 8px rgba(251,191,36,.15),0 0 28px rgba(251,191,36,.72);
}
.scale{
  display:flex;
  justify-content:space-between;
  color:#64748b;
  font-size:.78rem;
  font-weight:700;
}
.results{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
}
.result-card{
  position:relative;
  overflow:hidden;
  padding:22px;
  min-height:178px;
}
.result-card::before{
  content:"";
  position:absolute;
  inset:auto -40px -58px auto;
  width:160px;
  height:160px;
  border-radius:50%;
  opacity:.18;
  filter:blur(2px);
}
.result-card.output::before{background:var(--blue)}
.result-card.input::before{background:var(--green)}
.result-card.payable::before{background:var(--gold)}
.result-card.credit::before{background:var(--purple)}
.card-kicker{
  color:#94a3b8;
  font-size:.88rem;
  font-weight:900;
}
.formula{
  margin-top:6px;
  color:#cbd5e1;
  font-size:.86rem;
  font-weight:700;
}
.big-number{
  margin:18px 0 8px;
  font-size:clamp(2rem,3.4vw,3.7rem);
  line-height:1;
  font-weight:900;
  font-variant-numeric:tabular-nums;
}
.number-blue{color:var(--blue);text-shadow:0 0 22px rgba(56,189,248,.42)}
.number-green{color:var(--green);text-shadow:0 0 22px rgba(52,211,153,.36)}
.number-gold{color:var(--gold);text-shadow:0 0 24px rgba(251,191,36,.42)}
.number-purple{color:var(--purple);text-shadow:0 0 24px rgba(167,139,250,.44)}
.card-note{
  color:#cbd5e1;
  font-size:.92rem;
  font-weight:800;
  overflow-wrap:anywhere;
}
.chart-panel{
  padding:22px;
}
.section-head{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:16px;
  margin-bottom:18px;
}
.section-title{
  margin:0;
  font-size:1.25rem;
  font-weight:900;
  overflow-wrap:anywhere;
}
.section-sub{
  margin:4px 0 0;
  color:#94a3b8;
  font-size:.86rem;
  font-weight:700;
  overflow-wrap:anywhere;
}
.chart-wrap{
  position:relative;
  min-height:360px;
  padding:24px 20px 44px;
  border:1px solid rgba(148,163,184,.18);
  border-radius:18px;
  background:
    linear-gradient(0deg,rgba(148,163,184,.12) 1px,transparent 1px),
    linear-gradient(180deg,rgba(15,23,42,.6),rgba(15,23,42,.25));
  background-size:100% 58px,100% 100%;
  overflow:hidden;
}
.bars{
  position:absolute;
  inset:28px 14% 58px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22%;
  align-items:end;
}
.bar-col{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  min-width:0;
  height:100%;
}
.bar{
  width:min(110px,72%);
  height:0%;
  min-height:4px;
  border-radius:16px 16px 6px 6px;
  transition:height .3s ease;
  box-shadow:0 0 26px rgba(255,255,255,.1);
}
.bar-output{
  background:linear-gradient(180deg,#7dd3fc 0%,#38bdf8 48%,#2563eb 100%);
  box-shadow:0 0 30px rgba(56,189,248,.4);
}
.bar-input{
  background:linear-gradient(180deg,#86efac 0%,#34d399 48%,#059669 100%);
  box-shadow:0 0 30px rgba(52,211,153,.35);
}
.bar-value{
  position:absolute;
  bottom:calc(var(--bar-height,0%) + 10px);
  max-width:150px;
  padding:5px 8px;
  border-radius:999px;
  color:#0f172a;
  background:#f8fafc;
  font-size:.78rem;
  font-weight:900;
  transition:bottom .3s ease;
  white-space:nowrap;
}
.bar-label{
  position:absolute;
  bottom:-35px;
  color:#cbd5e1;
  font-size:.9rem;
  font-weight:900;
  text-align:center;
}
.diff-band{
  position:absolute;
  left:50%;
  bottom:0%;
  width:18%;
  min-height:0;
  transform:translateX(-50%);
  border-radius:999px;
  background:linear-gradient(180deg,rgba(251,191,36,.94),rgba(245,158,11,.86));
  box-shadow:0 0 24px rgba(251,191,36,.38);
  transition:bottom .3s ease,height .3s ease,background .3s ease,box-shadow .3s ease;
}
.diff-band.credit{
  background:linear-gradient(180deg,rgba(196,181,253,.95),rgba(124,58,237,.86));
  box-shadow:0 0 24px rgba(167,139,250,.42);
}
.diff-label{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  min-width:130px;
  padding:7px 10px;
  border-radius:999px;
  color:#0f172a;
  background:#fff7ed;
  box-shadow:0 10px 26px rgba(2,6,23,.24);
  text-align:center;
  font-size:.84rem;
  font-weight:900;
  white-space:nowrap;
}
.diff-band.credit .diff-label{background:#f5f3ff}
.zero-line{
  position:absolute;
  left:8%;
  right:8%;
  bottom:58px;
  border-top:1px solid rgba(226,232,240,.28);
}
.advisor{
  position:sticky;
  top:22px;
  padding:18px;
}
.advisor-head{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:14px;
}
.advisor-icon{
  display:grid;
  place-items:center;
  width:48px;
  height:48px;
  border-radius:16px;
  background:linear-gradient(135deg,#fbbf24,#f97316);
  color:#111827;
  font-size:1.5rem;
  box-shadow:0 0 30px rgba(251,191,36,.24);
}
.advisor-title{
  font-size:1.15rem;
  font-weight:900;
}
.advisor-sub{
  margin-top:2px;
  color:#94a3b8;
  font-size:.8rem;
  font-weight:700;
}
.tips{
  display:grid;
  gap:10px;
}
.tip-card{
  padding:14px;
  border:1px solid rgba(148,163,184,.18);
  border-radius:16px;
  background:rgba(15,23,42,.58);
  color:#dbeafe;
  font-size:.93rem;
  line-height:1.65;
  font-weight:800;
  overflow-wrap:anywhere;
}
.status-badge{
  margin-top:16px;
  padding:16px;
  border-radius:18px;
  border:1px solid rgba(251,191,36,.28);
  background:linear-gradient(180deg,rgba(251,191,36,.12),rgba(15,23,42,.56));
}
.status-label{
  color:#fde68a;
  font-size:.82rem;
  font-weight:900;
}
.status-main{
  margin-top:6px;
  font-size:1.55rem;
  line-height:1.18;
  font-weight:900;
  overflow-wrap:anywhere;
}
.status-main.credit-text{color:var(--purple)}
.status-main.pay-text{color:var(--gold)}
.status-main.zero-text{color:#e2e8f0}
@media(max-width:1180px){
  .topbar{grid-template-columns:1fr}
  .scenario-panel{width:100%}
  .main-grid{grid-template-columns:1fr}
  .advisor{position:static}
}
@media(max-width:820px){
  .app{width:100%;max-width:100vw;padding:18px}
  .topbar,.main-grid,.calculator,.slider-panel,.slider-box,.scenario-panel,.scenario-buttons,.results,.result-card,.chart-panel,.advisor{width:100%;max-width:100%}
  h1{max-width:100%;font-size:clamp(1.9rem,9.2vw,2.45rem);line-height:1.08;word-break:break-all}
  .lead{max-width:100%;font-size:.96rem;line-height:1.72;word-break:break-all}
  .slider-panel,.results{grid-template-columns:1fr}
  .scenario-buttons{grid-template-columns:1fr}
  .scenario-panel{padding:12px}
  .scenario-btn{display:block;padding:10px 12px}
  .slider-panel{padding:14px;gap:14px}
  .slider-box{padding:16px;overflow:hidden}
  .slider-head{width:100%}
  .range-wrap{width:100%;padding-left:2px;padding-right:2px}
  .slider-box,.result-card,.chart-panel,.advisor{border-radius:18px}
  .chart-wrap{min-height:330px}
  .bars{inset:26px 10% 58px;gap:18%}
  input[type=range]{height:44px;max-width:100%}
  input[type=range]::-webkit-slider-thumb{width:36px;height:36px;margin-top:-13px}
}
@media(max-width:520px){
  .app{padding:18px 12px}
  h1{font-size:clamp(1.7rem,8vw,1.92rem)}
  .lead{font-size:.96rem}
  .scenario-title{font-size:.86rem}
  .slider-head{flex-direction:column}
  .amount-pill{align-self:flex-start}
  .slider-box,.result-card,.chart-panel,.advisor{padding:16px}
  .chart-wrap{padding:18px 10px 42px}
  .bar{width:min(88px,82%)}
  .diff-band{width:24%}
  .diff-label{min-width:110px;font-size:.78rem}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <div class="eyebrow"><span class="pulse"></span>營業稅秒懂試算｜一般稅率 5%</div>
      <h1>拖一下滑桿，<br>這期要繳多少一眼看懂</h1>
      <p class="lead">給小公司老闆看的互動試算頁。銷售額與進項額都用未稅金額輸入，系統即時計算銷項稅、進項稅與應納稅額。</p>
    </div>

    <section class="scenario-panel" aria-label="教學情境快捷鍵">
      <p class="scenario-title">教學模式快捷鍵</p>
      <div class="scenario-buttons">
        <button class="scenario-btn" type="button" data-sales="2000000" data-purchase="1500000">📦 一般中小企業</button>
        <button class="scenario-btn" type="button" data-sales="800000" data-purchase="300000">🍱 餐飲業</button>
        <button class="scenario-btn" type="button" data-sales="500000" data-purchase="2000000">💸 大量採購期</button>
      </div>
    </section>
  </header>

  <main class="main-grid">
    <section class="calculator">
      <section class="slider-panel" aria-label="營業稅試算滑桿">
        <div class="slider-box">
          <div class="slider-head">
            <label class="slider-label" for="salesRange">📈 本期銷售額（未稅）</label>
            <output class="amount-pill" id="salesAmount" for="salesRange"></output>
          </div>
          <div class="range-wrap">
            <input id="salesRange" type="range" min="0" max="5000000" step="10000" value="1000000">
          </div>
          <div class="scale"><span>0</span><span>500 萬</span></div>
        </div>

        <div class="slider-box">
          <div class="slider-head">
            <label class="slider-label" for="purchaseRange">📉 本期進項額（未稅）</label>
            <output class="amount-pill" id="purchaseAmount" for="purchaseRange"></output>
          </div>
          <div class="range-wrap">
            <input id="purchaseRange" type="range" min="0" max="5000000" step="10000" value="800000">
          </div>
          <div class="scale"><span>0</span><span>500 萬</span></div>
        </div>
      </section>

      <section class="results" aria-label="即時計算結果">
        <article class="result-card output">
          <div class="card-kicker">銷項稅額</div>
          <div class="formula">銷售額 × 5%</div>
          <div class="big-number number-blue" id="outputTax">0</div>
          <div class="card-note">你向客戶收的稅</div>
        </article>

        <article class="result-card input">
          <div class="card-kicker">進項稅額</div>
          <div class="formula">進項額 × 5%</div>
          <div class="big-number number-green" id="inputTax">0</div>
          <div class="card-note">你付給供應商的稅</div>
        </article>

        <article class="result-card payable" id="payableCard">
          <div class="card-kicker">應納稅額</div>
          <div class="formula">銷項 - 進項</div>
          <div class="big-number number-gold" id="payableTax">0</div>
          <div class="card-note" id="payableNote">這期要繳的稅</div>
        </article>
      </section>

      <section class="chart-panel" aria-label="營業稅視覺化長條圖">
        <div class="section-head">
          <div>
            <h2 class="section-title">稅額長條圖</h2>
            <p class="section-sub">藍色是銷項稅，綠色是進項稅，中間差距就是應納或留抵。</p>
          </div>
        </div>
        <div class="chart-wrap">
          <div class="zero-line"></div>
          <div class="bars">
            <div class="bar-col">
              <div class="bar-value" id="outputBarValue">0</div>
              <div class="bar bar-output" id="outputBar"></div>
              <div class="bar-label">銷項稅額</div>
            </div>
            <div class="bar-col">
              <div class="bar-value" id="inputBarValue">0</div>
              <div class="bar bar-input" id="inputBar"></div>
              <div class="bar-label">進項稅額</div>
            </div>
            <div class="diff-band" id="diffBand"><div class="diff-label" id="diffLabel">差額 0</div></div>
          </div>
        </div>
      </section>
    </section>

    <aside class="advisor" aria-label="會計師小提醒">
      <div class="advisor-head">
        <div class="advisor-icon">💡</div>
        <div>
          <div class="advisor-title">會計師小提醒</div>
          <div class="advisor-sub">依照目前試算結果自動切換</div>
        </div>
      </div>
      <div class="tips" id="tips"></div>
      <div class="status-badge">
        <div class="status-label">目前狀態</div>
        <div class="status-main pay-text" id="statusMain">這期要繳稅</div>
      </div>
    </aside>
  </main>
</div>

<script>
const TAX_RATE = 0.05;
const MAX_BASE = 5_000_000;
const MAX_TAX = MAX_BASE * TAX_RATE;

const salesRange = document.getElementById("salesRange");
const purchaseRange = document.getElementById("purchaseRange");
const salesAmount = document.getElementById("salesAmount");
const purchaseAmount = document.getElementById("purchaseAmount");
const outputTaxEl = document.getElementById("outputTax");
const inputTaxEl = document.getElementById("inputTax");
const payableTaxEl = document.getElementById("payableTax");
const payableNote = document.getElementById("payableNote");
const payableCard = document.getElementById("payableCard");
const outputBar = document.getElementById("outputBar");
const inputBar = document.getElementById("inputBar");
const outputBarValue = document.getElementById("outputBarValue");
const inputBarValue = document.getElementById("inputBarValue");
const diffBand = document.getElementById("diffBand");
const diffLabel = document.getElementById("diffLabel");
const tips = document.getElementById("tips");
const statusMain = document.getElementById("statusMain");

function formatMoney(value){
  return Math.round(value).toLocaleString("zh-TW") + " 元";
}

function formatBase(value){
  if(value === 0) return "0 元";
  if(value % 10000 === 0) return (value / 10000).toLocaleString("zh-TW") + " 萬";
  return formatMoney(value);
}

function setResultState(payable){
  payableCard.classList.toggle("credit", payable < 0);
  payableTaxEl.classList.toggle("number-gold", payable >= 0);
  payableTaxEl.classList.toggle("number-purple", payable < 0);

  if(payable > 0){
    payableTaxEl.textContent = formatMoney(payable);
    payableNote.textContent = "這期要繳的稅";
    statusMain.textContent = "這期要繳稅";
    statusMain.className = "status-main pay-text";
    tips.innerHTML = `
      <div class="tip-card">💡 你要在下期申報時繳這筆稅</div>
      <div class="tip-card">💡 申報期：1/15、3/15、5/15、7/15、9/15、11/15</div>
      <div class="tip-card">💡 直覺看法：銷項稅比進項稅多，多出來的差額要繳給國稅局</div>
    `;
  } else if(payable === 0){
    payableTaxEl.textContent = "0 元";
    payableNote.textContent = "不用繳也沒得退";
    statusMain.textContent = "剛好打平";
    statusMain.className = "status-main zero-text";
    tips.innerHTML = `
      <div class="tip-card">💡 銷進剛好打平，這期不繳也不退</div>
      <div class="tip-card">💡 仍然要照期申報，不能因為不用繳就不申報</div>
      <div class="tip-card">💡 這是教學上的理想狀態，實務仍要看發票與申報資料</div>
    `;
  } else {
    const credit = Math.abs(payable);
    payableTaxEl.textContent = formatMoney(credit);
    payableNote.textContent = `留抵稅額（下期可扣抵 ${formatMoney(credit)}）`;
    statusMain.textContent = "產生留抵稅額";
    statusMain.className = "status-main credit-text";
    tips.innerHTML = `
      <div class="tip-card">💡 你有留抵稅額，可以累積到下期扣抵</div>
      <div class="tip-card">💡 留抵不會消失，但要主動申報</div>
      <div class="tip-card">💡 直覺看法：這期買得多、進項稅多，先留下來下期抵</div>
    `;
  }
}

function updateChart(outputTax, inputTax, payable){
  const outputPct = Math.max(0, Math.min(100, outputTax / MAX_TAX * 100));
  const inputPct = Math.max(0, Math.min(100, inputTax / MAX_TAX * 100));
  const low = Math.min(outputPct, inputPct);
  const diff = Math.abs(outputPct - inputPct);

  outputBar.style.height = outputPct + "%";
  inputBar.style.height = inputPct + "%";
  outputBar.parentElement.style.setProperty("--bar-height", outputPct + "%");
  inputBar.parentElement.style.setProperty("--bar-height", inputPct + "%");
  outputBarValue.textContent = formatMoney(outputTax);
  inputBarValue.textContent = formatMoney(inputTax);

  diffBand.style.bottom = low + "%";
  diffBand.style.height = Math.max(diff, payable === 0 ? 1 : 4) + "%";
  diffBand.classList.toggle("credit", payable < 0);
  if(payable > 0){
    diffLabel.textContent = "要繳 " + formatMoney(payable);
  } else if(payable < 0){
    diffLabel.textContent = "留抵 " + formatMoney(Math.abs(payable));
  } else {
    diffLabel.textContent = "打平 0 元";
  }
}

function update(){
  const sales = Number(salesRange.value);
  const purchase = Number(purchaseRange.value);
  const outputTax = Math.round(sales * TAX_RATE);
  const inputTax = Math.round(purchase * TAX_RATE);
  const payable = outputTax - inputTax;

  salesAmount.textContent = formatBase(sales);
  purchaseAmount.textContent = formatBase(purchase);
  outputTaxEl.textContent = formatMoney(outputTax);
  inputTaxEl.textContent = formatMoney(inputTax);

  setResultState(payable);
  updateChart(outputTax, inputTax, payable);
}

function animateTo(targetSales, targetPurchase){
  salesRange.value = targetSales;
  purchaseRange.value = targetPurchase;
  update();
}

salesRange.addEventListener("input", update);
purchaseRange.addEventListener("input", update);
document.querySelectorAll(".scenario-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    animateTo(Number(btn.dataset.sales), Number(btn.dataset.purchase));
  });
});

update();
</script>
</body>
</html>
