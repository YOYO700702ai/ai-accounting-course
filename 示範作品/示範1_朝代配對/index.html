<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>朝代配對 · 古典中國風</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#2b1810;
    --bg2:#3a2418;
    --paper:#f5e7c4;
    --paper2:#e8d5a3;
    --gold:#d4af37;
    --gold2:#f4d56b;
    --red:#a8201a;
    --red2:#d63832;
    --ink:#1a0f08;
    --ok:#3e8e41;
    --muted:#8b7355;
  }
  html,body{height:100%;
    font-family:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體",serif;
    color:var(--paper);background:
      radial-gradient(ellipse at top,#4a2e1d,#1a0f08 70%);
    -webkit-font-smoothing:antialiased}
  body{display:flex;align-items:flex-start;justify-content:center;padding:16px;min-height:100vh}

  .stage{width:min(1200px,100%);
    background:linear-gradient(180deg,var(--bg2),var(--bg));
    border-radius:18px;padding:20px 22px;
    box-shadow:0 18px 50px rgba(0,0,0,.6);
    border:2px solid var(--gold);
    position:relative}
  .stage::before{
    content:"";position:absolute;inset:6px;
    border:1px solid rgba(212,175,55,.4);border-radius:12px;
    pointer-events:none}

  .topbar{display:flex;justify-content:space-between;align-items:center;
    margin-bottom:14px;padding:0 6px;position:relative;z-index:1}
  .title{font-size:clamp(22px,3vw,30px);font-weight:900;color:var(--gold2);
    letter-spacing:.2em;text-shadow:0 2px 6px rgba(0,0,0,.5)}
  .title .accent{color:var(--red2)}
  .stats{font-size:15px;color:var(--paper2);letter-spacing:.08em}
  .stats b{color:var(--gold2);font-size:20px;margin:0 4px}

  /* 主要兩欄區 */
  .board{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;position:relative;z-index:1}

  /* 朝代欄 */
  .dynasty-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .dynasty{background:linear-gradient(180deg,var(--paper),var(--paper2));
    border:2px solid var(--gold);border-radius:10px;
    padding:10px 8px;color:var(--ink);
    min-height:170px;
    display:flex;flex-direction:column;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
    position:relative;
    transition:all .2s ease}
  .dynasty::before{
    content:"";position:absolute;inset:3px;
    border:1px dashed rgba(168,32,26,.3);border-radius:7px;
    pointer-events:none}
  .dynasty .dname{font-size:28px;font-weight:900;text-align:center;
    color:var(--red);letter-spacing:.15em;
    margin-bottom:6px;padding-bottom:4px;
    border-bottom:1px solid rgba(168,32,26,.4);
    text-shadow:0 1px 0 rgba(255,255,255,.5);
    font-family:"Noto Serif TC",serif}
  .dynasty .dropzone{flex:1;display:flex;flex-wrap:wrap;gap:4px;
    align-content:flex-start;padding:4px;
    min-height:90px;
    border-radius:6px;
    transition:background .15s}
  .dynasty.dragover{transform:scale(1.03);
    box-shadow:0 0 0 3px var(--gold2),0 6px 20px rgba(212,175,55,.4)}
  .dynasty.dragover .dropzone{background:rgba(212,175,55,.15)}
  .dynasty.flash-bad{animation:badflash .4s ease}
  .dynasty.flash-good{animation:goodflash .6s ease}

  /* 縮圖卡（堆疊在朝代格內） */
  .mini{background:linear-gradient(180deg,#5da868,#3e8e41);
    color:#fff;border:1px solid #2d6b30;
    border-radius:6px;padding:3px 6px;
    font-size:11px;font-weight:700;
    display:inline-flex;align-items:center;gap:3px;
    box-shadow:0 2px 4px rgba(0,0,0,.25);
    animation:lock .5s ease}
  .mini .mi{font-size:13px}

  /* 事件欄 */
  .events-wrap{background:linear-gradient(180deg,#1f1109,#150a05);
    border:2px solid var(--red);border-radius:10px;
    padding:12px;
    box-shadow:inset 0 0 20px rgba(0,0,0,.5)}
  .events-title{text-align:center;font-size:16px;color:var(--gold2);
    letter-spacing:.2em;margin-bottom:10px;
    padding-bottom:6px;border-bottom:1px dashed rgba(212,175,55,.4)}
  .events{display:grid;grid-template-columns:1fr 1fr;gap:8px;
    max-height:520px;overflow-y:auto;padding:2px}
  .events::-webkit-scrollbar{width:8px}
  .events::-webkit-scrollbar-track{background:rgba(0,0,0,.3);border-radius:4px}
  .events::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}

  .event{background:linear-gradient(180deg,#3a1815,#23100d);
    border:2px solid var(--red);border-radius:8px;
    padding:10px 8px;color:var(--paper);
    cursor:grab;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    text-align:center;
    transition:transform .15s,box-shadow .15s;
    user-select:none;
    box-shadow:0 3px 8px rgba(0,0,0,.4)}
  .event:hover{transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(168,32,26,.5);
    border-color:var(--gold2)}
  .event:active{cursor:grabbing}
  .event.dragging{opacity:.35;transform:scale(.95)}
  .event.shake{animation:shake .4s ease}
  .event .ei{font-size:28px;line-height:1}
  .event .et{font-size:13px;font-weight:700;line-height:1.3}

  /* 過關畫面 */
  .win-overlay{position:fixed;inset:0;
    background:radial-gradient(ellipse at center,rgba(0,0,0,.7),rgba(0,0,0,.92));
    display:none;align-items:center;justify-content:center;
    z-index:100;padding:20px}
  .win-overlay.show{display:flex;animation:fadein .4s ease}
  .win-card{background:linear-gradient(180deg,var(--paper),var(--paper2));
    border:3px solid var(--gold);border-radius:16px;
    padding:36px 40px;text-align:center;color:var(--ink);
    max-width:440px;width:100%;
    box-shadow:0 0 60px rgba(212,175,55,.6),0 0 120px rgba(212,175,55,.3);
    position:relative;
    animation:winpop .6s ease}
  .win-card::before{
    content:"";position:absolute;inset:8px;
    border:1px dashed rgba(168,32,26,.4);border-radius:10px;
    pointer-events:none}
  .win-card h2{font-size:36px;color:var(--red);
    letter-spacing:.2em;margin-bottom:18px;
    text-shadow:0 2px 4px rgba(0,0,0,.15)}
  .win-card .scroll{font-size:18px;line-height:1.8;margin-bottom:8px}
  .win-card .scroll b{color:var(--red);font-size:24px;margin:0 4px}
  .win-card .rate{color:var(--muted);font-size:16px;margin-bottom:22px}
  .win-card button{background:linear-gradient(180deg,var(--red2),var(--red));
    color:#fff;border:2px solid var(--gold);
    padding:12px 32px;font-size:18px;font-weight:900;
    border-radius:8px;cursor:pointer;
    letter-spacing:.15em;font-family:inherit;
    box-shadow:0 4px 12px rgba(168,32,26,.5);
    transition:all .2s}
  .win-card button:hover{transform:translateY(-2px);
    box-shadow:0 6px 18px rgba(168,32,26,.7)}

  /* 動畫 */
  @keyframes badflash{
    0%,100%{background:linear-gradient(180deg,var(--paper),var(--paper2))}
    50%{background:linear-gradient(180deg,#f8a8a3,#e57b75);
        box-shadow:0 0 0 3px var(--red2),0 0 30px rgba(214,56,50,.7)}
  }
  @keyframes goodflash{
    0%,100%{box-shadow:0 4px 12px rgba(0,0,0,.3)}
    40%{box-shadow:0 0 0 4px var(--ok),0 0 35px rgba(62,142,65,.7)}
  }
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-6px)}
    80%{transform:translateX(4px)}
  }
  @keyframes lock{
    0%{transform:scale(.4);opacity:0}
    60%{transform:scale(1.15)}
    100%{transform:scale(1);opacity:1}
  }
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes winpop{
    0%{transform:scale(.5) rotate(-5deg);opacity:0}
    60%{transform:scale(1.05) rotate(2deg)}
    100%{transform:scale(1) rotate(0);opacity:1}
  }

  /* 金粉飄落 */
  .sparkle{position:absolute;pointer-events:none;
    font-size:24px;animation:sparklefall 2.5s linear forwards;z-index:101}
  @keyframes sparklefall{
    0%{transform:translateY(-20vh) rotate(0);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0}
  }

  /* RWD */
  @media(max-width:760px){
    .board{grid-template-columns:1fr}
    .dynasty-grid{grid-template-columns:1fr 1fr}
    .events{grid-template-columns:1fr 1fr 1fr;max-height:none}
    .dynasty .dname{font-size:22px}
    .title{font-size:20px}
  }
</style>
</head>
<body>
<a href="../大冒險地圖/index.html" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(26,15,8,.85);color:#f4d56b;padding:8px 14px;border-radius:6px;font-size:14px;text-decoration:none;font-weight:700;border:1px solid #d4af37">← 回到大地圖</a>
<div class="stage">
  <div class="topbar">
    <div class="title">朝代 <span class="accent">配對</span> 試煉</div>
    <div class="stats">嘗試次數 <b id="attempts">0</b> · 已配對 <b id="matched">0</b>/<b id="total">0</b></div>
  </div>

  <div class="board">
    <div class="dynasty-grid" id="dynastyGrid"></div>
    <div class="events-wrap">
      <div class="events-title">將下列事件拖入正確朝代</div>
      <div class="events" id="events"></div>
    </div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <h2>全部過關</h2>
    <div class="scroll">總共嘗試 <b id="finalAttempts">0</b> 次</div>
    <div class="rate">答對率 <span id="finalRate">--</span></div>
    <button id="restartBtn">再玩一次</button>
  </div>
</div>

<script>
  // ===== 資料 =====
  const DYNASTIES = [
    { id: 1, name: "秦" },
    { id: 2, name: "漢" },
    { id: 3, name: "唐" },
    { id: 4, name: "宋" },
    { id: 5, name: "明" },
    { id: 6, name: "清" }
  ];
  const EVENTS = [
    { id: 'e1',  dynasty_id: 1, text: "統一六國",         icon: "⚔️" },
    { id: 'e2',  dynasty_id: 1, text: "修築萬里長城",     icon: "🧱" },
    { id: 'e3',  dynasty_id: 1, text: "焚書坑儒",         icon: "🔥" },
    { id: 'e4',  dynasty_id: 2, text: "張騫通西域",       icon: "🐪" },
    { id: 'e5',  dynasty_id: 2, text: "文景之治",         icon: "📜" },
    { id: 'e6',  dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
    { id: 'e7',  dynasty_id: 3, text: "貞觀之治",         icon: "👑" },
    { id: 'e8',  dynasty_id: 3, text: "安史之亂",         icon: "💥" },
    { id: 'e9',  dynasty_id: 3, text: "玄奘西行取經",     icon: "🧘" },
    { id: 'e10', dynasty_id: 4, text: "王安石變法",       icon: "📝" },
    { id: 'e11', dynasty_id: 4, text: "岳飛抗金",         icon: "🗡️" },
    { id: 'e12', dynasty_id: 5, text: "鄭和下西洋",       icon: "⛵" },
    { id: 'e13', dynasty_id: 5, text: "永樂大典編成",     icon: "📚" },
    { id: 'e14', dynasty_id: 6, text: "鴉片戰爭",         icon: "💣" },
    { id: 'e15', dynasty_id: 6, text: "康熙盛世",         icon: "🌅" },
    { id: 'e16', dynasty_id: 6, text: "辛亥革命終結",     icon: "🏛️" }
  ];

  // ===== 狀態 =====
  let attempts = 0;
  let matched = 0;
  let currentDragId = null;

  const $ = (id) => document.getElementById(id);
  const grid = $('dynastyGrid');
  const eventsEl = $('events');
  const attemptsEl = $('attempts');
  const matchedEl = $('matched');
  const totalEl = $('total');

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function renderDynasties() {
    grid.innerHTML = '';
    DYNASTIES.forEach(d => {
      const el = document.createElement('div');
      el.className = 'dynasty';
      el.dataset.dynastyId = d.id;
      el.innerHTML = `
        <div class="dname">${d.name}</div>
        <div class="dropzone" data-zone="${d.id}"></div>
      `;
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        el.classList.add('dragover');
      });
      el.addEventListener('dragleave', () => {
        el.classList.remove('dragover');
      });
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        el.classList.remove('dragover');
        const eid = e.dataTransfer.getData('text/plain') || currentDragId;
        if (eid) tryMatch(eid, d.id, el);
      });
      grid.appendChild(el);
    });
  }

  function renderEvents() {
    eventsEl.innerHTML = '';
    const order = shuffle(EVENTS);
    order.forEach(ev => {
      const el = document.createElement('div');
      el.className = 'event';
      el.draggable = true;
      el.dataset.eventId = ev.id;
      el.innerHTML = `
        <div class="ei">${ev.icon}</div>
        <div class="et">${ev.text}</div>
      `;
      el.addEventListener('dragstart', (e) => {
        currentDragId = ev.id;
        e.dataTransfer.setData('text/plain', ev.id);
        e.dataTransfer.effectAllowed = 'move';
        el.classList.add('dragging');
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        currentDragId = null;
      });
      eventsEl.appendChild(el);
    });
  }

  function tryMatch(eventId, targetDynastyId, dynastyEl) {
    const ev = EVENTS.find(x => x.id === eventId);
    if (!ev) return;
    const eventEl = eventsEl.querySelector(`[data-event-id="${eventId}"]`);
    if (!eventEl) return;

    attempts++;
    attemptsEl.textContent = attempts;

    if (ev.dynasty_id === targetDynastyId) {
      // 配對成功 → 移除事件卡，加入縮圖
      eventEl.remove();
      const mini = document.createElement('div');
      mini.className = 'mini';
      mini.innerHTML = `<span class="mi">${ev.icon}</span><span>${ev.text}</span>`;
      dynastyEl.querySelector('.dropzone').appendChild(mini);
      dynastyEl.classList.add('flash-good');
      setTimeout(() => dynastyEl.classList.remove('flash-good'), 600);
      matched++;
      matchedEl.textContent = matched;
      if (matched === EVENTS.length) {
        setTimeout(showWin, 500);
      }
    } else {
      // 錯誤 → 紅閃 + 抖動
      dynastyEl.classList.add('flash-bad');
      eventEl.classList.add('shake');
      setTimeout(() => {
        dynastyEl.classList.remove('flash-bad');
        eventEl.classList.remove('shake');
      }, 450);
    }
  }

  function showWin() {
    $('finalAttempts').textContent = attempts;
    const rate = attempts > 0 ? `${EVENTS.length}/${attempts}` : '--';
    $('finalRate').textContent = rate;
    $('winOverlay').classList.add('show');
    spawnSparkles();
    localStorage.setItem('cert_dynasty', '朝代之印');
    if (!localStorage.getItem('adventure_start')) localStorage.setItem('adventure_start', Date.now());
  }

  function spawnSparkles() {
    const icons = ['✨','🌟','⭐','🎉','🏮'];
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = icons[Math.floor(Math.random() * icons.length)];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = '0';
      s.style.animationDelay = (Math.random() * 1.5) + 's';
      s.style.fontSize = (16 + Math.random() * 22) + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 4000);
    }
  }

  function reset() {
    attempts = 0;
    matched = 0;
    attemptsEl.textContent = 0;
    matchedEl.textContent = 0;
    $('winOverlay').classList.remove('show');
    renderDynasties();
    renderEvents();
  }

  $('restartBtn').addEventListener('click', reset);

  // 初始化
  totalEl.textContent = EVENTS.length;
  renderDynasties();
  renderEvents();
</script>
</body>
</html>
